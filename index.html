<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pi Day Pulse - a living pie of noise, harmonics, and glow</title>
  <meta name="description" content="A one-screen Pi Day card where pie, noise, harmonics, pulse, and pi drift into one living audio-visual scene.">
  <meta name="theme-color" content="#091021">
  <link rel="canonical" href="https://gamemaster4200.github.io/_314159/">
  <meta property="og:title" content="Pi Day Pulse">
  <meta property="og:description" content="A living Pi Day card where pie, noise, harmonics, pulse, and pi meet in one glowing scene.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://gamemaster4200.github.io/_314159/">
  <meta property="og:image" content="https://gamemaster4200.github.io/_314159/apple-touch-icon.png">
  <meta property="og:image:alt" content="A warm pie with a whipped-cream pi symbol.">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Pi Day Pulse">
  <meta name="twitter:description" content="A living Pi Day card where pie, noise, harmonics, pulse, and pi meet in one glowing scene.">
  <meta name="twitter:image" content="https://gamemaster4200.github.io/_314159/apple-touch-icon.png">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <canvas id="scene" aria-hidden="true"></canvas>

    <div class="hud">
      <div class="brand">
        <span class="eyebrow">Pi Day Pulse</span>
        <h1>Pie from noise</h1>
        <p>A glowing Pi Day card in noise, harmonics, and pulse.</p>
      </div>

      <button id="controlsToggle" class="controls-toggle" type="button" aria-controls="controlsPanel" aria-expanded="false">
        Controls
      </button>

      <section id="controlsPanel" class="controls" aria-label="Controls">
        <label>
          <span>Noise</span>
          <input id="noise" type="range" min="0" max="100" value="52">
        </label>
        <label>
          <span>Pulse</span>
          <input id="pulse" type="range" min="0" max="100" value="64">
        </label>
        <label>
          <span>Slices</span>
          <input id="slices" type="range" min="4" max="24" value="10">
        </label>
        <label>
          <span>Mode</span>
          <select id="mode">
            <option value="random">Random</option>
            <option value="quasi">Quasi</option>
            <option value="pi" selected>Pi Series</option>
          </select>
          <small id="modeNote" class="mode-note">Random scatters. Quasi settles.</small>
        </label>
        <label>
          <span>Order</span>
          <input id="order" type="range" min="1" max="9" value="7">
        </label>
        <label>
          <span>Noise Type</span>
          <select id="noiseType">
            <option value="white">White</option>
            <option value="smooth">Smooth</option>
            <option value="band" selected>Band</option>
          </select>
        </label>
        <label>
          <span>Beat Length</span>
          <input id="beatLength" type="range" min="0" max="100" value="46">
        </label>
        <label>
          <span>Beat Pitch</span>
          <input id="beatPitch" type="range" min="0" max="100" value="48">
        </label>
        <div class="button-row">
          <button id="audioToggle" type="button">Play</button>
          <button id="piemButton" type="button">Piem</button>
        </div>
      </section>
    </div>

    <button id="startHint" class="start-hint" type="button">Start the Pi pulse</button>

    <div id="piemOverlay" class="overlay" aria-hidden="true">
      <div class="overlay-backdrop" data-close="true"></div>
      <article class="piem-card" role="dialog" aria-modal="true" aria-labelledby="piemTitle">
        <button id="closeOverlay" class="close" type="button" aria-label="Close">+</button>
        <p class="eyebrow">Meta-piem</p>
        <h2 id="piemTitle">Secondary layer</h2>
        <div class="poem">
          <p>Тон и свет.</p>
          <p>Шум.</p>
          <p>Что я хочу, а?</p>
          <p>Код!</p>
          <p>Пою я piem о форме.</p>
          <p>Тут и круг и пирог: запускаем мы проект снова.</p>
        </div>
      </article>
    </div>

    <a
      id="buildBadge"
      class="build-badge"
      href="https://github.com/gamemaster4200/_314159"
      target="_blank"
      rel="noreferrer noopener"
    >repo</a>
  </main>

  <script src="script.js"></script>
</body>
</html>
